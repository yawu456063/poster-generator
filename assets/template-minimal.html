<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简雅致海报</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&family=Noto+Sans+SC:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        /* 主题色变量 - 替换此处即可切换配色 */
        :root {
            --primary: #1a1a1a;
            --primary-rgb: 26, 26, 26;
            --bg: #ffffff;
            --bg-secondary: #f8f8f8;
            --text: #1a1a1a;
            --text-secondary: #666666;
            --accent: #c8a96e;
            --accent-rgb: 200, 169, 110;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e8e8e8;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
        }

        .poster {
            width: 600px;
            min-height: 850px;
            background: var(--bg);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            padding: 80px 60px;
            display: flex;
            flex-direction: column;
        }

        /* 顶部极细装饰线 */
        .poster::before {
            content: '';
            position: absolute;
            top: 40px;
            left: 60px;
            right: 60px;
            height: 1px;
            background: rgba(var(--primary-rgb), 0.15);
        }

        /* 底部极细装饰线 */
        .poster::after {
            content: '';
            position: absolute;
            bottom: 40px;
            left: 60px;
            right: 60px;
            height: 1px;
            background: rgba(var(--primary-rgb), 0.15);
        }

        /* 标签/徽章区 */
        .badge-area {
            margin-bottom: 60px;
            margin-top: 20px;
        }

        .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            border: 1px solid rgba(var(--accent-rgb), 0.4);
            padding: 6px 14px;
            animation: badgePulse 3s ease-in-out infinite;
        }

        @keyframes badgePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* 主标题 */
        .title {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            font-size: 42px;
            font-weight: 200;
            line-height: 1.3;
            color: var(--text);
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        /* 副标题 */
        .subtitle {
            font-size: 16px;
            font-weight: 300;
            color: var(--text-secondary);
            margin-bottom: 48px;
            line-height: 1.6;
        }

        /* 分隔装饰 - 小圆点 */
        .divider {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 40px;
        }

        .divider .dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--accent);
        }

        .divider .line {
            width: 40px;
            height: 1px;
            background: rgba(var(--primary-rgb), 0.12);
        }

        /* 信息行 */
        .info-section {
            margin-bottom: 40px;
        }

        .info-row {
            display: flex;
            align-items: baseline;
            margin-bottom: 16px;
        }

        .info-label {
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-secondary);
            width: 60px;
            flex-shrink: 0;
        }

        .info-value {
            font-size: 15px;
            font-weight: 300;
            color: var(--text);
        }

        /* 正文描述 */
        .description {
            font-size: 14px;
            font-weight: 300;
            line-height: 1.9;
            color: var(--text-secondary);
            margin-bottom: auto;
            padding-bottom: 60px;
        }

        /* 底部信息栏 */
        .footer {
            margin-top: auto;
            padding-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .footer-left {
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }

        .footer-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .footer-right .square {
            width: 6px;
            height: 6px;
            background: var(--accent);
        }

        .footer-right span {
            font-size: 11px;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="poster">
        <!-- POSTER_CONTENT -->

        <!-- 标签/徽章区 -->
        <div class="badge-area">
            <span class="badge">艺术展览</span>
        </div>

        <!-- 主标题 -->
        <h1 class="title">留白之间<br>看见世界</h1>

        <!-- 副标题 -->
        <p class="subtitle">一场关于空间与沉默的当代艺术对话</p>

        <!-- 分隔装饰 -->
        <div class="divider">
            <span class="dot"></span>
            <span class="line"></span>
            <span class="dot"></span>
        </div>

        <!-- 信息行 -->
        <div class="info-section">
            <div class="info-row">
                <span class="info-label">时间</span>
                <span class="info-value">2026年6月15日 14:00 - 18:00</span>
            </div>
            <div class="info-row">
                <span class="info-label">地点</span>
                <span class="info-value">白盒子艺术中心 · 三层展厅</span>
            </div>
            <div class="info-row">
                <span class="info-label">策展</span>
                <span class="info-value">林一山</span>
            </div>
        </div>

        <!-- 正文描述 -->
        <p class="description">
            本次展览汇集八位当代艺术家的最新创作，探索极简主义在东方语境下的全新表达。从水墨到装置，从平面到空间，每一件作品都在追问：当我们去掉一切多余，剩下的是什么？
        </p>

        <!-- 底部信息栏 -->
        <div class="footer">
            <div class="footer-left">免费入场 · 无需预约</div>
            <div class="footer-right">
                <span class="square"></span>
                <span>MINIMAL ART 2026</span>
            </div>
        </div>
    </div>
</body>
</html>
