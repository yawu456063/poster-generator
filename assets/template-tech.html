<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科技未来海报</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+SC:wght@300;400;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* 主题色变量 - 替换此处即可切换配色 */
        :root {
            --primary: #0a0e1a;
            --primary-rgb: 10, 14, 26;
            --bg: #0d1117;
            --bg-secondary: #161b22;
            --text: #e6edf3;
            --text-secondary: #7d8590;
            --accent: #00d4ff;
            --accent-rgb: 0, 212, 255;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
        }

        .poster {
            width: 600px;
            min-height: 850px;
            background: var(--bg);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(var(--accent-rgb), 0.08);
            border: 1px solid rgba(var(--accent-rgb), 0.15);
            padding: 50px;
            display: flex;
            flex-direction: column;
        }

        /* 网格线背景 */
        .poster::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(rgba(var(--accent-rgb), 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(var(--accent-rgb), 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* 发光圆圈装饰 */
        .poster::after {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(var(--accent-rgb), 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        /* 顶部粒子感装饰 */
        .particles {
            position: absolute;
            top: 30px;
            right: 50px;
            display: flex;
            gap: 6px;
            align-items: flex-end;
        }

        .particle {
            width: 3px;
            background: rgba(var(--accent-rgb), 0.5);
            border-radius: 1px;
            animation: particleFloat 2s ease-in-out infinite;
        }

        .particle:nth-child(1) { height: 12px; animation-delay: 0s; }
        .particle:nth-child(2) { height: 20px; animation-delay: 0.2s; }
        .particle:nth-child(3) { height: 8px; animation-delay: 0.4s; }
        .particle:nth-child(4) { height: 16px; animation-delay: 0.6s; }
        .particle:nth-child(5) { height: 10px; animation-delay: 0.8s; }

        @keyframes particleFloat {
            0%, 100% { opacity: 0.5; transform: scaleY(1); }
            50% { opacity: 1; transform: scaleY(1.3); }
        }

        /* 标签/徽章区 */
        .badge-area {
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        .badge {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 2px;
            color: var(--accent);
            border: 1px solid rgba(var(--accent-rgb), 0.4);
            padding: 6px 14px;
            position: relative;
            animation: badgeScan 3s linear infinite;
        }

        .badge::before {
            content: '>';
            margin-right: 6px;
            opacity: 0.6;
        }

        @keyframes badgeScan {
            0%, 100% { border-color: rgba(var(--accent-rgb), 0.4); }
            50% { border-color: rgba(var(--accent-rgb), 0.8); box-shadow: 0 0 8px rgba(var(--accent-rgb), 0.2); }
        }

        /* 主标题 */
        .title {
            font-size: 44px;
            font-weight: 800;
            line-height: 1.2;
            color: var(--text);
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
            background: linear-gradient(135deg, var(--text) 30%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 副标题 */
        .subtitle {
            font-size: 16px;
            font-weight: 300;
            color: var(--text-secondary);
            margin-bottom: 48px;
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }

        /* 分隔线 - 发光效果 */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, var(--accent), rgba(var(--accent-rgb), 0.1));
            margin-bottom: 36px;
            position: relative;
            z-index: 1;
        }

        .divider::after {
            content: '';
            position: absolute;
            left: 0;
            top: -2px;
            width: 6px;
            height: 5px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent);
        }

        /* 信息行 */
        .info-section {
            margin-bottom: 36px;
            position: relative;
            z-index: 1;
        }

        .info-row {
            display: flex;
            align-items: baseline;
            margin-bottom: 14px;
            padding: 10px 16px;
            background: rgba(var(--accent-rgb), 0.03);
            border-left: 2px solid rgba(var(--accent-rgb), 0.3);
        }

        .info-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--accent);
            width: 70px;
            flex-shrink: 0;
            opacity: 0.8;
        }

        .info-value {
            font-size: 14px;
            font-weight: 400;
            color: var(--text);
        }

        /* 正文描述 */
        .description {
            font-size: 14px;
            font-weight: 300;
            line-height: 1.9;
            color: var(--text-secondary);
            margin-bottom: auto;
            padding-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        /* 底部信息栏 */
        .footer {
            margin-top: auto;
            padding-top: 24px;
            border-top: 1px solid rgba(var(--accent-rgb), 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .footer-left {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .footer-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-right .glow-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent);
            animation: dotPulse 2s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { box-shadow: 0 0 6px var(--accent); }
            50% { box-shadow: 0 0 12px var(--accent), 0 0 20px rgba(var(--accent-rgb), 0.3); }
        }

        .footer-right span {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--accent);
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="poster">
        <!-- 粒子装饰 -->
        <div class="particles">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>

        <!-- POSTER_CONTENT -->

        <!-- 标签/徽章区 -->
        <div class="badge-area">
            <span class="badge">HACKATHON</span>
        </div>

        <!-- 主标题 -->
        <h1 class="title">AI 创造者<br>黑客马拉松</h1>

        <!-- 副标题 -->
        <p class="subtitle">48 小时，用代码重新定义未来的边界</p>

        <!-- 分隔线 -->
        <div class="divider"></div>

        <!-- 信息行 -->
        <div class="info-section">
            <div class="info-row">
                <span class="info-label">date</span>
                <span class="info-value">2026年8月10日 - 12日</span>
            </div>
            <div class="info-row">
                <span class="info-label">venue</span>
                <span class="info-value">深圳湾科技生态园 · 创新中心</span>
            </div>
            <div class="info-row">
                <span class="info-label">host</span>
                <span class="info-value">OpenAI 中国开发者社区</span>
            </div>
        </div>

        <!-- 正文描述 -->
        <p class="description">
            集结最顶尖的开发者、设计师和创业者，在 48 小时内从零到一打造 AI 原生产品。提供 GPU 集群、API 额度和导师支持，最终角逐 100 万奖金池。无论你是独立开发者还是创业团队，这里是你释放创造力的终极舞台。
        </p>

        <!-- 底部信息栏 -->
        <div class="footer">
            <div class="footer-left">// seats: 200 | fee: ¥0</div>
            <div class="footer-right">
                <span class="glow-dot"></span>
                <span>LIVE.2026</span>
            </div>
        </div>
    </div>
</body>
</html>
