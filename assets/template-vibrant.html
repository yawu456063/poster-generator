<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活力缤纷海报</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* 主题色变量 - 替换此处即可切换配色 */
        :root {
            --primary: #ff6b35;
            --primary-rgb: 255, 107, 53;
            --bg: #fff8f0;
            --bg-secondary: #ffedd5;
            --text: #2d1810;
            --text-secondary: #6b4c3b;
            --accent: #7c3aed;
            --accent-rgb: 124, 58, 237;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e8ddd4;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
        }

        .poster {
            width: 600px;
            min-height: 850px;
            background: var(--bg);
            position: relative;
            overflow: hidden;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.1);
            border-radius: 24px;
            padding: 50px;
            display: flex;
            flex-direction: column;
        }

        /* 大色块装饰 - 右上角 */
        .poster::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -60px;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: rgba(var(--primary-rgb), 0.15);
            pointer-events: none;
        }

        /* 大色块装饰 - 左下角 */
        .poster::after {
            content: '';
            position: absolute;
            bottom: -40px;
            left: -40px;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: rgba(var(--accent-rgb), 0.1);
            pointer-events: none;
        }

        /* 波浪装饰 */
        .wave-decoration {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            overflow: hidden;
            pointer-events: none;
        }

        .wave-decoration::before {
            content: '';
            position: absolute;
            bottom: -60px;
            left: -10%;
            right: -10%;
            height: 120px;
            border-radius: 50% 50% 0 0;
            background: rgba(var(--primary-rgb), 0.05);
        }

        /* 不规则形状装饰 */
        .shape-1 {
            position: absolute;
            top: 200px;
            right: 40px;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(var(--accent-rgb), 0.12);
            transform: rotate(15deg);
        }

        .shape-2 {
            position: absolute;
            top: 380px;
            left: 30px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(var(--primary-rgb), 0.15);
        }

        /* 标签/徽章区 */
        .badge-area {
            margin-bottom: 28px;
            position: relative;
            z-index: 1;
        }

        .badge {
            display: inline-block;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #ffffff;
            background: linear-gradient(135deg, var(--primary), rgba(var(--accent-rgb), 0.9));
            padding: 8px 18px;
            border-radius: 20px;
            animation: badgeBounce 2s ease-in-out infinite;
        }

        @keyframes badgeBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        /* 主标题 */
        .title {
            font-size: 40px;
            font-weight: 900;
            line-height: 1.25;
            color: var(--text);
            margin-bottom: 14px;
            position: relative;
            z-index: 1;
        }

        .title .highlight {
            color: var(--primary);
        }

        /* 副标题 */
        .subtitle {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 36px;
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }

        /* 分隔线 - 多彩圆点 */
        .divider {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 32px;
            position: relative;
            z-index: 1;
        }

        .divider .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .divider .dot:nth-child(1) { background: var(--primary); }
        .divider .dot:nth-child(2) { background: var(--accent); }
        .divider .dot:nth-child(3) { background: rgba(var(--primary-rgb), 0.4); }
        .divider .dot:nth-child(4) { background: rgba(var(--accent-rgb), 0.4); }

        .divider .line {
            flex: 1;
            height: 3px;
            background: linear-gradient(90deg, var(--bg-secondary), transparent);
            border-radius: 2px;
        }

        /* 信息行 */
        .info-section {
            margin-bottom: 28px;
            position: relative;
            z-index: 1;
        }

        .info-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            padding: 14px 20px;
            background: var(--bg-secondary);
            border-radius: 12px;
        }

        .info-emoji {
            font-size: 18px;
            margin-right: 14px;
            width: 24px;
            text-align: center;
        }

        .info-content {
            flex: 1;
        }

        .info-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 2px;
        }

        .info-value {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
        }

        /* 正文描述 */
        .description {
            font-size: 14px;
            font-weight: 400;
            line-height: 1.9;
            color: var(--text-secondary);
            margin-bottom: auto;
            padding-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        /* 底部信息栏 */
        .footer {
            margin-top: auto;
            padding: 20px 24px;
            background: linear-gradient(135deg, rgba(var(--primary-rgb), 0.08), rgba(var(--accent-rgb), 0.08));
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .footer-left {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
        }

        .footer-right {
            font-size: 11px;
            font-weight: 600;
            color: var(--primary);
            padding: 6px 14px;
            background: rgba(var(--primary-rgb), 0.1);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="poster">
        <!-- 装饰元素 -->
        <div class="shape-1"></div>
        <div class="shape-2"></div>
        <div class="wave-decoration"></div>

        <!-- POSTER_CONTENT -->

        <!-- 标签/徽章区 -->
        <div class="badge-area">
            <span class="badge">🎉 周末工作坊</span>
        </div>

        <!-- 主标题 -->
        <h1 class="title">手作陶艺<br><span class="highlight">慢时光</span>体验日</h1>

        <!-- 副标题 -->
        <p class="subtitle">放下手机，用双手感受泥土的温度</p>

        <!-- 分隔线 -->
        <div class="divider">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="line"></span>
        </div>

        <!-- 信息行 -->
        <div class="info-section">
            <div class="info-row">
                <span class="info-emoji">📅</span>
                <div class="info-content">
                    <div class="info-label">时间</div>
                    <div class="info-value">2026年6月22日（周六）14:00 - 17:00</div>
                </div>
            </div>
            <div class="info-row">
                <span class="info-emoji">📍</span>
                <div class="info-content">
                    <div class="info-label">地点</div>
                    <div class="info-value">春风里创意园区 B3 工作室</div>
                </div>
            </div>
            <div class="info-row">
                <span class="info-emoji">👥</span>
                <div class="info-content">
                    <div class="info-label">名额</div>
                    <div class="info-value">限 15 人，含材料费 + 下午茶</div>
                </div>
            </div>
        </div>

        <!-- 正文描述 -->
        <p class="description">
            专业陶艺老师全程指导，零基础也能轻松上手！体验拉坯、手捏、上釉全流程，带走属于你的独一无二的作品。还有精致下午茶和手作市集等你来逛~
        </p>

        <!-- 底部信息栏 -->
        <div class="footer">
            <div class="footer-left">¥128/人 · 闺蜜同行9折</div>
            <div class="footer-right">立即报名 →</div>
        </div>
    </div>
</body>
</html>
