name: Unpack poster generator skill

on:
  push:
    paths:
      - poster-generator-upload.zip.b64
      - .github/workflows/unpack-skill.yml

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' }}
    steps:
      - uses: actions/checkout@v4
      - name: Unpack skill files
        run: |
          test -f poster-generator-upload.zip.b64
          base64 -d poster-generator-upload.zip.b64 > poster-generator-upload.zip
          unzip -o poster-generator-upload.zip
          rm poster-generator-upload.zip poster-generator-upload.zip.b64
      - name: Commit unpacked files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets references poster-generator-upload.zip.b64 .github/workflows/unpack-skill.yml
          git diff --cached --quiet || git commit -m "Add poster generator assets and references"
          git push
